<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Disaster Severity Predictor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Disaster Severity Prediction</h2>

<form id="predictForm">

<label>Total Deaths</label>
<input type="number" id="deaths" required>

<label>Total Injured</label>
<input type="number" id="injured" required>

<label>Total Affected</label>
<input type="number" id="affected" required>

<label>Total Homeless</label>
<input type="number" id="homeless" required>

<label>Total Damage (USD)</label>
<input type="number" id="damage" required>

<label>Area Affected</label>
<input type="number" id="area" required>

<button type="submit">Predict Severity</button>

</form>

<h3>Prediction Result</h3>
<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>

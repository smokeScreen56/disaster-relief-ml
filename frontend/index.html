<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRDS — Disaster Relief Decision System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Condensed:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0d0d0d;
    --surface:#141414;
    --border: #272727;
    --green:  #39ff7e;
    --amber:  #f5a623;
    --red:    #ff4444;
    --dim:    #444;
    --text:   #c8c8c8;
    --mono:   'IBM Plex Mono', monospace;
    --cond:   'IBM Plex Sans Condensed', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    min-height: 100vh;
  }

  .shell {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 28px;
  }
  .title {
    font-family: var(--cond);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: #e0e0e0;
    text-transform: uppercase;
  }
  .title span { color: var(--green); }
  .subtitle {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: 3px;
  }
  .header-right {
    text-align: right;
    font-size: 11px;
    color: var(--dim);
    line-height: 1.9;
  }
  #clock { color: var(--green); }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .panel-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .panel-body { padding: 16px 14px; }

  /* Fields */
  .field { margin-bottom: 12px; }
  .field:last-of-type { margin-bottom: 0; }
  label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 5px;
  }
  input[type="number"], input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: var(--mono);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    -moz-appearance: textfield;
    appearance: textfield;
    transition: border-color 0.15s;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input:focus { border-color: #333; color: var(--green); }
  input::placeholder { color: var(--dim); font-size: 11px; }

  /* Button */
  .btn-submit {
    width: 100%;
    margin-top: 14px;
    padding: 10px 0;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .btn-submit:hover { background: var(--green); color: var(--bg); }
  .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  /* Scenarios */
  .scenario-list { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
  .scenario-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 10px;
    padding: 7px 10px;
    text-align: left;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: border-color 0.15s, color 0.15s;
  }
  .scenario-btn:hover { border-color: var(--green); color: var(--green); }

  /* Endpoint input */
  #apiEndpoint {
    color: var(--amber);
    font-size: 11px;
  }

  /* Log */
  #reqLog {
    font-size: 10px;
    color: var(--dim);
    line-height: 2;
    max-height: 80px;
    overflow-y: auto;
    margin-top: 8px;
  }

  /* Result panel */
  .result-panel { grid-column: 1 / -1; }

  .result-idle {
    padding: 36px 14px;
    text-align: center;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.14em;
  }

  /* Priority row */
  .priority-row {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .priority-badge {
    font-family: var(--cond);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .priority-badge.HIGH   { color: var(--red); }
  .priority-badge.MEDIUM { color: var(--amber); }
  .priority-badge.LOW    { color: var(--green); }

  .conf-block { flex: 1; min-width: 140px; }
  .conf-label { font-size: 10px; letter-spacing: 0.16em; color: var(--dim); text-transform: uppercase; }
  .conf-val { font-size: 20px; color: var(--text); margin: 3px 0; }
  .conf-bar-wrap { height: 2px; background: var(--border); }
  .conf-bar { height: 100%; background: var(--green); transition: width 0.7s ease; }

  /* Probs */
  .prob-row {
    display: flex;
    gap: 0;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .prob-item { flex: 1; }
  .prob-item .plabel { font-size: 10px; color: var(--dim); letter-spacing: 0.12em; text-transform: uppercase; }
  .prob-item .pval { font-size: 16px; color: var(--text); margin-top: 2px; }
  .prob-item.active .pval { color: var(--green); }

  /* Features */
  .features-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .section-label { font-size: 10px; letter-spacing: 0.16em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .feat-list { display: flex; flex-direction: column; gap: 5px; }
  .feat-item { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .feat-name { color: var(--dim); min-width: 190px; }
  .feat-bar-wrap { flex: 1; height: 2px; background: var(--border); }
  .feat-bar { height: 100%; background: #2a4a33; transition: width 0.7s ease; }
  .feat-val { color: #4a8a58; min-width: 36px; text-align: right; font-size: 10px; }

  /* LLM */
  .llm-section { padding: 14px; }
  .llm-label { font-size: 10px; letter-spacing: 0.16em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .llm-text { font-family: var(--mono); font-size: 11px; color: var(--text); line-height: 1.8; white-space: pre-wrap; word-break: break-word; }

  /* Loading */
  .loading-wrap { padding: 36px 14px; text-align: center; }
  .loading-bar { width: 160px; height: 1px; background: var(--border); margin: 12px auto; position: relative; overflow: hidden; }
  .loading-bar::after {
    content: ''; position: absolute; top: 0; left: -50%; width: 50%; height: 100%;
    background: var(--green); animation: scan 1s linear infinite;
  }
  @keyframes scan { to { left: 110%; } }
  .loading-msg { font-size: 10px; letter-spacing: 0.18em; color: var(--dim); text-transform: uppercase; }

  /* Error */
  .error-msg { padding: 16px 14px; color: var(--red); font-size: 11px; border-left: 1px solid var(--red); margin: 14px; }

  /* Footer */
  footer {
    margin-top: 24px;
    border-top: 1px solid var(--border);
    padding: 10px 0;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.1em;
    flex-wrap: wrap;
    gap: 6px;
  }
  .status-dot {
    display: inline-block; width: 5px; height: 5px;
    background: var(--green); border-radius: 50%; margin-right: 5px;
    animation: blink 2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeUp 0.3s ease forwards; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div>
      <div class="title">DR<span>D</span>S</div>
      <div class="subtitle">Disaster Relief Decision System</div>
    </div>
    <div class="header-right">
      <div id="clock">--:--:--</div>
      <div>MODEL: HYBRID-ML v2</div>
    </div>
  </header>

  <div class="grid">

    <!-- Input Panel -->
    <div class="panel">
      <div class="panel-title">Event Parameters</div>
      <div class="panel-body">
        <form id="disasterForm" autocomplete="off">
          <div class="field">
            <label>Total Deaths</label>
            <input type="number" name="deaths" min="0" placeholder="0" required>
          </div>
          <div class="field">
            <label>No. Injured</label>
            <input type="number" name="injured" min="0" placeholder="0" required>
          </div>
          <div class="field">
            <label>No. Affected</label>
            <input type="number" name="affected" min="0" placeholder="0" required>
          </div>
          <div class="field">
            <label>No. Homeless</label>
            <input type="number" name="homeless" min="0" placeholder="0" required>
          </div>
          <div class="field">
            <label>Damage (USD thousands)</label>
            <input type="number" name="damage_usd" min="0" step="0.01" placeholder="0.00" required>
          </div>
          <div class="field">
            <label>Area Affected (km²)</label>
            <input type="number" name="area_affected" min="0" step="0.01" placeholder="0.00" required>
          </div>
          <button type="submit" class="btn-submit" id="submitBtn">
            <span id="btnText">▶ Analyse Event</span>
          </button>
        </form>
      </div>
    </div>

    <!-- Config Panel -->
    <div class="panel">
      <div class="panel-title">Config</div>
      <div class="panel-body">
        <div class="field">
          <label>API Endpoint</label>
          <input type="text" id="apiEndpoint" value="http://localhost:8000">
        </div>

        <div style="margin-top: 16px;">
          <div class="section-label">Quick Scenarios</div>
          <div class="scenario-list">
            <button class="scenario-btn" data-scenario="high">A — High severity flood</button>
            <button class="scenario-btn" data-scenario="medium">B — Medium severity earthquake</button>
            <button class="scenario-btn" data-scenario="low">C — Low severity windstorm</button>
          </div>
        </div>

        <div style="margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border);">
          <div class="section-label">Request Log</div>
          <div id="reqLog"><div>— no requests yet —</div></div>
        </div>
      </div>
    </div>

    <!-- Result Panel -->
    <div class="panel result-panel" id="resultPanel">
      <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Decision Output</span>
        <span id="resultTime" style="color:var(--dim);font-size:10px;"></span>
      </div>
      <div id="resultBody">
        <div class="result-idle">awaiting input — submit event parameters to begin analysis</div>
      </div>
    </div>

  </div>

  <footer>
    <div><span class="status-dot"></span>DRDS online — hybrid dataset — ML+LLM pipeline</div>
    <div id="req-count">Requests: 0</div>
    <div>v2.0 phase 3</div>
  </footer>

</div>

<script>
  // Clock
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toTimeString().slice(0,8) + ' UTC' + (now.getTimezoneOffset() > 0 ? '-' : '+') +
      String(Math.abs(now.getTimezoneOffset()/60)).padStart(2,'0');
  }
  tick(); setInterval(tick, 1000);

  // Scenarios
  const SCENARIOS = {
    high:   { deaths:420, injured:1300, affected:80000, homeless:12000, damage_usd:900000, area_affected:2400 },
    medium: { deaths:85,  injured:430,  affected:15000, homeless:3000,  damage_usd:120000, area_affected:650 },
    low:    { deaths:4,   injured:22,   affected:800,   homeless:0,     damage_usd:8000,   area_affected:90 },
  };

  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = SCENARIOS[btn.dataset.scenario];
      const form = document.getElementById('disasterForm');
      Object.entries(s).forEach(([k, v]) => {
        const el = form.querySelector(`[name="${k}"]`);
        if (el) el.value = v;
      });
    });
  });

  document.getElementById('apiEndpoint').addEventListener('input', e => {
    document.getElementById('api-url') && (document.getElementById('api-url').textContent = e.target.value.replace(/https?:\/\//, ''));
  });

  let reqCount = 0;
  function logRequest(status, priority) {
    reqCount++;
    document.getElementById('req-count').textContent = `Requests: ${reqCount}`;
    const log = document.getElementById('reqLog');
    const time = new Date().toTimeString().slice(0,8);
    const entry = document.createElement('div');
    entry.style.color = status === 'OK' ? 'var(--green)' : 'var(--red)';
    entry.textContent = `[${time}] ${status}${priority ? ' → ' + priority.toUpperCase() : ''}`;
    if (log.querySelector('div')?.textContent === '— no requests yet —') log.innerHTML = '';
    log.prepend(entry);
    if (log.children.length > 8) log.removeChild(log.lastChild);
  }

  function showLoading() {
    document.getElementById('resultTime').textContent = '';
    document.getElementById('resultBody').innerHTML = `
      <div class="loading-wrap">
        <div class="loading-msg">Processing event data</div>
        <div class="loading-bar"></div>
        <div class="loading-msg" style="color:#2a2a2a">Running ML pipeline → querying LLM</div>
      </div>`;
  }

  function showResult(data) {
    const p = (data.priority || '').toUpperCase();
    const conf = Math.round((data.confidence || 0) * 100);
    const probs = data.probabilities || {};
    const reasons = data.reasons || [];
    const llm = data.llm_explanation || '';

    document.getElementById('resultTime').textContent = new Date().toTimeString().slice(0,8);

    const maxImp = Math.max(...reasons.map(r => {
      const m = r.match(/importance: ([\d.]+)/);
      return m ? parseFloat(m[1]) : 0;
    }), 0.01);

    const featRows = reasons.map(r => {
      const parts = r.match(/^(.+?) \(importance: ([\d.]+)\)$/);
      if (!parts) return '';
      const [, name, imp] = parts;
      const pct = Math.round((parseFloat(imp) / maxImp) * 100);
      return `
        <div class="feat-item">
          <div class="feat-name">${name}</div>
          <div class="feat-bar-wrap"><div class="feat-bar" style="width:0%" data-w="${pct}%"></div></div>
          <div class="feat-val">${parseFloat(imp).toFixed(3)}</div>
        </div>`;
    }).join('');

    const probItems = Object.entries(probs).map(([label, val]) => {
      const active = label.toUpperCase() === p ? 'active' : '';
      return `<div class="prob-item ${active}">
        <div class="plabel">${label}</div>
        <div class="pval">${(val * 100).toFixed(1)}%</div>
      </div>`;
    }).join('');

    const isLive = llm && !llm.includes('LLM service unavailable');
    const sourceTag = isLive ? 'GEMINI / GROQ' : 'STATIC FALLBACK';

    document.getElementById('resultBody').innerHTML = `
      <div class="fade-in">
        <div class="priority-row">
          <div class="priority-badge ${p}">${p}</div>
          <div class="conf-block">
            <div class="conf-label">Confidence</div>
            <div class="conf-val">${conf}%</div>
            <div class="conf-bar-wrap"><div class="conf-bar" style="width:0%" data-w="${conf}%"></div></div>
          </div>
          ${probItems ? `<div style="display:flex;gap:0;flex:2">${probItems}</div>` : ''}
        </div>

        ${featRows ? `
        <div class="features-section">
          <div class="section-label">Top contributing features</div>
          <div class="feat-list">${featRows}</div>
        </div>` : ''}

        <div class="llm-section">
          <div class="llm-label">LLM narrative &nbsp;<span style="color:var(--dim);font-size:9px;letter-spacing:0.1em">${sourceTag}</span></div>
          <div class="llm-text">${escHtml(llm)}</div>
        </div>
      </div>`;

    requestAnimationFrame(() => {
      document.querySelectorAll('[data-w]').forEach(el => { el.style.width = el.dataset.w; });
    });
  }

  function showError(msg) {
    document.getElementById('resultBody').innerHTML =
      `<div class="error-msg">ERR — ${escHtml(msg)}<br><br>Check API endpoint and ensure the FastAPI server is running.</div>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('disasterForm').addEventListener('submit', async e => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('submitBtn');
    const txtEl = document.getElementById('btnText');

    const payload = {
      deaths:        parseInt(form.deaths.value)        || 0,
      injured:       parseInt(form.injured.value)       || 0,
      affected:      parseInt(form.affected.value)      || 0,
      homeless:      parseInt(form.homeless.value)      || 0,
      damage_usd:    parseFloat(form.damage_usd.value)  || 0,
      area_affected: parseFloat(form.area_affected.value) || 0,
    };

    btn.disabled = true;
    txtEl.textContent = '◼ Processing...';
    showLoading();

    const endpoint = (document.getElementById('apiEndpoint').value || 'http://localhost:8000').replace(/\/$/, '');

    try {
      const res = await fetch(`${endpoint}/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
      const data = await res.json();
      showResult(data);
      logRequest('OK', data.priority);
    } catch (err) {
      showError(err.message);
      logRequest('ERR', null);
    } finally {
      btn.disabled = false;
      txtEl.textContent = '▶ Analyse Event';
    }
  });
</script>
</body>
</html>
